[package]
name = "immunum2"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
chrono = "0.4"

[build-dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[lib]
name = "immunum2"
path = "src/lib.rs"

[[bin]]
name = "immunum"
path = "src/main.rs"

[[bin]]
name = "debug-validation"
path = "src/bin/debug_validation.rs"

[[bin]]
name = "benchmark"
path = "src/bin/benchmark.rs"

[[bin]]
name = "speed-benchmark"
path = "src/bin/speed_benchmark.rs"
