name: Bencher

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  bencher:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Taskfile
        run: uv tool install go-task-bin

      - name: Run bencher
        run: task bencher
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}

  bencher-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Taskfile
        run: uv tool install go-task-bin

      - name: Run bencher
        run: task bencher
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
