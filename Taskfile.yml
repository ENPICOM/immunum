version: "3"

tasks:
    build:
        cmds:
            - uv sync --all-extras --all-groups --dev --compile-bytecode
            - pre-commit install

    reinstall:
        cmds:
            - uv sync --reinstall

    build-ci:
        cmd: uv sync --locked --all-extras --all-groups --dev

    test-python:
        deps: [build-python]
        aliases: [tp]
        cmd: uv run pytest {docs,tests/test_python.py} -n  $(( $(nproc) - 2 )) --benchmark-disable {{.CLI_ARGS}}

    test-polars:
        deps: [build-polars]
        aliases: [tp]
        cmd: uv run pytest tests/test_polars.py -n  $(( $(nproc) - 2 )) --benchmark-disable {{.CLI_ARGS}}

    test-rust:
        aliases: [tr]
        cmd: cargo test --all-features

    test:
        aliases: [t]
        cmds:
            - task test-rust
            - task test-python
            - task: test-polars

    lint:
        cmds:
            - cargo clippy --all-targets  --all-features -- -D warnings
            - uv run ruff check --config pyproject.toml
            - uv run ty check --project .
            - uv run pyrefly check -j 0
            - 'git grep "# type: ignore\s*$" src/** && (echo -e "\033[31mBlanket ignores are not allowed\033[0m"; exit 1) || exit 0'

    format:
        aliases: [f]
        cmds:
            - cargo fmt --all --check
            - ruff check --fix --config pyproject.toml
            - ruff format --config pyproject.toml

    coverage:
        aliases: [cov]
        cmds:
            - uv run coverage run -m pytest --show-capture=no --disable-warnings --tb=no
            - uv run coverage report -m

    pysentry:
        cmds:
            - uv run pysentry-rs --all-extras .

    docs-serve:
        cmd: uv run --no-project --group docs mkdocs serve

    docs:
        cmd: task docs-serve

    docs-build:
        cmd: uv run --no-project --group docs mkdocs build {{.CLI_ARGS}}

    default:
        cmds:
            - task --list-all

    build-python:
        cmds:
            # important to use `uv tool`` and not `uv run` since it's another environment
            - uv tool run maturin develop --uv --features python --profile {{.PROFILE | default "mindebug-dev"}} --manifest-path ./Cargo.toml {{.CLI_ARGS}}

    build-polars:
        cmds:
            # important to use `uv tool`` and not `uv run` since it's another environment
            - uv tool run maturin develop --uv --features "python,polars" --profile {{.PROFILE | default "mindebug-dev"}} --manifest-path ./Cargo.toml {{.CLI_ARGS}}
            - uv sync --all-extras --all-groups --dev --compile-bytecode

    ci:
        cmds:
            - task: build-ci
            - task: lint
            - task: pysentry
            - task: test
              vars:
                  PROFILE: "{{.PROFILE}}"
            - task: test
            - task: coverage
            - task: docs-build
