version: "3"

tasks:
    build:
        cmds:
            - uv sync --all-extras --all-groups --dev --compile-bytecode
            - pre-commit install

    reinstall:
        cmds:
            - uv sync --reinstall

    build-ci:
        cmd: uv sync --locked --all-extras --all-groups --dev

    check:
        aliases: [c]
        cmd: uv run pytest -n  $(( $(nproc) - 2 )) -q --show-capture=no --disable-warnings --tb=no {{.CLI_ARGS}}

    test-python:
        aliases: [tp]
        cmd: uv run pytest -n  $(( $(nproc) - 2 )) --benchmark-disable {{.CLI_ARGS}}

    test-rust:
        aliases: [tr]
        cmd: cargo test --no-default-features

    test:
        aliases: [t]
        cmds:
            - task test-rust
            - task test-python

    lint:
        cmds:
            - cargo clippy --all-targets  --all-features -- -D warnings
            - uv run ruff check --config pyproject.toml
            - uv run ty check --project .
            - uv run pyrefly check -j 0
            - 'git grep "# type: ignore\s*$" src/** && (echo -e "\033[31mBlanket ignores are not allowed\033[0m"; exit 1) || exit 0'

    format:
        aliases: [f]
        cmds:
            - cargo fmt --all --check
            - ruff check --fix --config pyproject.toml
            - ruff format --config pyproject.toml

    coverage:
        aliases: [cov]
        cmds:
            - uv run coverage run -m pytest --show-capture=no --disable-warnings --tb=no
            - uv run coverage report -m

    pysentry:
        cmds:
            - uv run pysentry-rs --all-extras .

    benchmark-comparison:
        desc: "Speed + correctness benchmark: immunum vs antpack vs anarci (1k IGH sequences)"
        cmd: uv run --group benchmark pytest tests/bench_comparison.py -v --benchmark-columns=min,mean,stddev --benchmark-group-by=func {{.CLI_ARGS}}

    benchmark-speed-polars:
        desc: "Speed benchmark for immunum polars across all chain/scheme fixtures"
        cmd: uv run pytest tests/bench_polars.py -v --benchmark-columns=min,mean,stddev --benchmark-group-by=func {{.CLI_ARGS}}

    benchmark-accuracy:
        desc: "Accuracy benchmark across all fixtures (1k sequences, 7 rounds each)"
        cmds:
            - |
                for f in fixtures/validation/*_imgt.csv; do
                  base=$(basename "$f" .csv)
                  chain=$(echo "$base" | cut -d_ -f2)
                  uv run --group benchmark python tests/bench_comparison.py \
                    --chain "$chain" \
                    --sizes 1000 --rounds 7 \
                    --output "./resources/benchmark_results/results_${base}.csv" \
                    --timeout 1m
                done

    benchmark-speed:
        desc: "Speed benchmark across dataset sizes (100 to 1M sequences, 7 rounds, H/imgt)"
        cmd: |
            uv run --group benchmark python tests/bench_comparison.py \
              --sizes 100 --sizes 1000 --sizes 10000 --sizes 100000 \
              --rounds 7 --output ./resources/benchmark_results/results_speed.csv --timeout 10m

    bench-scaling:
        desc: "Scaling benchmark: sizes 100..10M (10x steps), 1 round, H/imgt. Pass CLI_ARGS to filter tools, e.g. -- --tools immunum"
        cmd: |
            uv run --group benchmark python tests/bench_comparison.py \
              --sizes 200 --sizes 2000 --sizes 20_000 --sizes 200_000 --sizes 2_000_000 \
              --rounds 1 --output ./resources/benchmark_results/results_scaling.csv \
              --timeout 30m {{.CLI_ARGS}}

    plots:
        desc: "Produce plots from benchmark results"
        cmd: uv run scripts/plots.py

    default:
        cmds:
            - task --list-all

    build-maturin:
        cmds:
            # important to use `uv tool`` and not `uv run` since it's another environment
            - uv tool run maturin develop --uv --profile {{.PROFILE | default "mindebug-dev"}} --manifest-path ./Cargo.toml {{.CLI_ARGS}}

    build-maturin-dist:
        cmds:
            - uv tool run maturin develop --profile dist-release --manifest-path ./Cargo.toml {{.CLI_ARGS}}

    ci:
        cmds:
            - task: build-ci
            - task: lint
            - task: pysentry
            - task: build-maturin
              vars:
                  PROFILE: "{{.PROFILE}}"
            - task: test
            - task: coverage
