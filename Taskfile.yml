version: "3"

tasks:
    build:
        silent: true
        vars:
            PROFILE: '{{.PROFILE | default "dev"}}'
        sources:
            - src/**/*.rs
            - build.rs
            - Cargo.toml
            - Cargo.lock
            - pyproject.toml
            - resources/**/*
        generates:
            - .venv/{CACHEDIR.TAG,pyvenv.cfg}
        cmds:
            - uv sync --all-extras --all-groups --no-group benchmark --dev -C "build-args=--profile {{.PROFILE}}" {{.CLI_ARGS}}

    build-local:
        vars:
            PROFILE: '{{.PROFILE | default "dev"}}'
        cmds:
            - task: build
              vars: { PROFILE: "{{.PROFILE}}", CLI_ARGS: "--locked" }
            - pre-commit install

    build-ci:
        vars:
            PROFILE: '{{.PROFILE | default "dev"}}'
        cmd:
            task: build
            vars: { PROFILE: "{{.PROFILE}}", CLI_ARGS: "--locked" }

    test-python:
        vars:
            PROFILE: '{{.PROFILE | default "dev"}}'
        deps:
            - task: build-ci
              vars: { PROFILE: "{{.PROFILE}}" }
        sources:
            - src/**/*.rs
            - build.rs
            - Cargo.toml
            - Cargo.lock
            - pyproject.toml
            - resources/**/*
            - tests/test_*.py
            - docs/**/*.md
        cmds:
            - uv run --no-sync pytest {docs,tests/test_*.py} -n  $(( $(nproc) - 2 )) --benchmark-disable {{.CLI_ARGS}}

    test-rust:
        vars:
            PROFILE: '{{.PROFILE | default "dev"}}'
        sources:
            - src/**/*.rs
            - build.rs
            - Cargo.toml
            - Cargo.lock
            - resources/**/*
            - tests/cli.rs
        cmds:
            - cargo test --no-default-features --profile {{.PROFILE}}
            - cargo test --test cli --profile {{.PROFILE}}

    test:
        aliases: [t]
        vars:
            PROFILE: '{{.PROFILE | default "dev"}}'
        cmds:
            - task: test-rust
              vars: { PROFILE: "{{.PROFILE}}" }
            - task: test-python
              vars: { PROFILE: "{{.PROFILE}}" }

    lint:
        vars:
            PROFILE: '{{.PROFILE | default "dev"}}'
        deps:
            - task: build
              vars: { PROFILE: "{{.PROFILE}}" }
        cmds:
            - cargo clippy --all-targets --all-features -- -D warnings
            - uv run --no-sync ruff check --config pyproject.toml
            - uv run --no-sync ty check --project .
            - uv run --no-sync pyrefly check -j 0
            - 'git grep "# type: ignore\s*$" src/** && (echo -e "\033[31mBlanket ignores are not allowed\033[0m"; exit 1) || exit 0'

    format:
        vars:
            PROFILE: '{{.PROFILE | default "dev"}}'
        deps:
            - task: build
              vars: { PROFILE: "{{.PROFILE}}" }
        cmds:
            - cargo fmt --all --check
            - uv run --no-sync ruff check --fix --config pyproject.toml
            - uv run --no-sync ruff format --config pyproject.toml

    coverage:
        vars:
            PROFILE: '{{.PROFILE | default "dev"}}'
        deps:
            - task: build
              vars: { PROFILE: "{{.PROFILE}}" }
        cmds:
            - uv run --no-sync coverage run -m pytest {docs,tests/test_*.py} --benchmark-disable {{.CLI_ARGS}}
            - uv run --no-sync coverage report -m

    pysentry:
        cmds:
            - uv run --no-sync pysentry-rs .

    docs-serve:
        cmd: uv run --no-sync --group docs mkdocs serve

    docs:
        cmd: task docs-serve

    docs-build:
        cmd: uv run --no-sync --group docs mkdocs build {{.CLI_ARGS}}

    benchmark-cli:
        desc: "Speed benchmark using Criterion (benches/speed_benchmark.rs)"
        cmd: cargo bench --no-default-features {{.CLI_ARGS}}

    benchmark-comparison:
        desc: "Speed + correctness benchmark: immunum vs antpack vs anarci (1k IGH sequences)"
        cmd: uv run --group benchmark pytest tests/bench_comparison.py -v --benchmark-columns=min,mean,stddev --benchmark-group-by=func {{.CLI_ARGS}}

    benchmark-speed-polars:
        desc: "Speed benchmark for immunum polars across all chain/scheme fixtures"
        cmd: uv run pytest tests/bench_polars.py -v --benchmark-columns=min,mean,stddev --benchmark-group-by=func {{.CLI_ARGS}}

    bencher-python:
        silent: true
        desc: "Run Python benchmarks with bencher"
        cmd: bencher run --adapter python_pytest --token {{.BENCHER_API_TOKEN}} --file results.json "uv run --no-sync pytest --benchmark-json results.json tests/bench_polars.py"

    bencher-rust:
        silent: true
        desc: "Run Criterion benchmarks with bencher"
        cmd: bencher run --adapter rust_criterion --token {{.BENCHER_API_TOKEN}} "cargo bench --no-default-features"

    bencher:
        preconditions:
            - sh: '[ -n "{{.BENCHER_API_TOKEN}}" ]'
              msg: "BENCHER_API_TOKEN is not set"
        cmds:
            - task: bencher-rust
            - task: bencher-python

    benchmark-accuracy:
        desc: "Accuracy benchmark across all fixtures (1k sequences, 7 rounds each)"
        cmds:
            - |
                for f in fixtures/validation/*_imgt.csv; do
                  base=$(basename "$f" .csv)
                  chain=$(echo "$base" | cut -d_ -f2)
                  uv run --group benchmark python tests/bench_comparison.py \
                    --chain "$chain" \
                    --sizes 1000 --rounds 7 \
                    --output "./resources/benchmark_results/results_${base}.csv" \
                    --timeout 1m
                done

    benchmark-speed:
        desc: "Speed benchmark across dataset sizes (100 to 1M sequences, 7 rounds, H/imgt)"
        cmd: |
            uv run --group benchmark python tests/bench_comparison.py \
              --sizes 100 --sizes 1000 --sizes 10000 --sizes 100000 \
              --rounds 7 --output ./resources/benchmark_results/results_speed.csv --timeout 10m \
            {{.CLI_ARGS}}

    benchmark-scaling:
        desc: "Scaling benchmark: sizes 100..10M (10x steps), 1 round, H/imgt. Pass CLI_ARGS to filter tools, e.g. -- --tools immunum"
        cmd: |
            uv run --group benchmark python tests/bench_comparison.py \
              --sizes 200 --sizes 2000 --sizes 20_000 --sizes 200_000 --sizes 2_000_000 \
              --rounds 1 --output ./resources/benchmark_results/results_scaling.csv \
              --timeout 30m {{.CLI_ARGS}}

    plots:
        desc: "Produce plots from benchmark results"
        cmd: uv run --script scripts/plots.py

    default:
        cmds:
            - task --list-all

    ci:
        env:
            PROFILE: "dev"
        cmds:
            - task: lint
            - task: pysentry
            - task: build-ci
              vars: { PROFILE: "{{.PROFILE}}" }
            - task: test
              vars: { PROFILE: "{{.PROFILE}}" }
            - task: coverage
              vars: { PROFILE: "{{.PROFILE}}" }
            - task: docs-build
