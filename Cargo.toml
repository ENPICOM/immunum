[package]
name = "immunum"
version = "0.1.0"
edition = "2021"
rust-version = "1.89.0"

[profile.release]
opt-level = 3
lto = true

[dependencies]
clap = { version = "4.5.40", features = ["derive"] }
flate2 = "1.1.2"
pyo3 = { version = "0.25.1", features = ["extension-module"], optional = true }
rayon = "1.10.0"
thiserror = "2.0.12"
wasm-bindgen = { version = "0.2.1", optional = true }
js-sys = { version = "0.3", optional = true }
wee_alloc = { version = "0.4.5", optional = true }
wasm-bindgen-test = "0.3.50"
phf = {version = "0.12.1" , features = ["macros"]}

[dev-dependencies]
criterion = { version = "0.7", features = ["html_reports"] }
assert_cmd = "2"
predicates = "3"

[lib]
name = "immunum"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "immunum-cli"
path = "src/main.rs"

[[bench]]
name = "performance_benchmarks"
harness = false

[features]
default = ["python", "wasm"]
python = ["pyo3"]
wasm = ["wasm-bindgen", "wee_alloc", "js-sys"]
